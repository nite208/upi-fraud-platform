global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fraud-api
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["fraud-api:8000"]

  - job_name: kafka
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ["kafka:9092"]
